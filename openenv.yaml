name: Customer Support AI Environment
description: AI system to simulate customer support decision making

observation_space:
  type: object
  properties:
    query: string
    category: string
    difficulty: string

action_space:
  type: string
  enum:
    - apologize
    - give_refund
    - ask_for_details
    - ignore

reward_range: [0.0, 1.0]

episodes:
  min: 3
