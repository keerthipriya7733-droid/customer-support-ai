name: Customer Support AI
description: AI environment for handling customer support queries

observation_space:
  type: object
  properties:
    query: string
    category: string
    difficulty: string

action_space:
  type: string
  enum:
    - apologize
    - give_refund
    - ask_for_details
    - ignore

reward_range: [0.0, 1.0]
episodes:
  min: 3
